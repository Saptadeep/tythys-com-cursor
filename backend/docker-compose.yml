services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: revenue_guard
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080"]
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/revenue_guard
      BOOTSTRAP_DB_SCHEMA: "0"
      INGEST_API_KEY: dev-ingest-key
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
